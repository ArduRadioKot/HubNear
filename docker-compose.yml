services:
  api:
    build: ./backend
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dvizh}
      POSTGRES_USER: ${POSTGRES_USER:-dvizh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvizh}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB:-0}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgis/postgis:18-3.6-alpine
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dvizh}
      POSTGRES_USER: ${POSTGRES_USER:-dvizh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvizh}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

volumes:
  postgres_data:
